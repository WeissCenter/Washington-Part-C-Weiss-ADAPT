@if (formGroup && controlName) {
  <ng-container [formGroup]="formGroup">
    @switch (level) {
      @case ('h1') {
        <h1 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h1>
      }
      @case ('h2') {
        <h2 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h2>
      }
      @case ('h3') {
        <h3 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h3>
      }
      @case ('h4') {
        <h4 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h4>
      }
      @case ('h5') {
        <h5 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h5>
      }
      @case ('h6') {
        <h6 [id]="id" [formControlName]="controlName" [libAdaptEditable]="editable" [ngClass]="ngClass">
          <ng-container [ngTemplateOutlet]="content"></ng-container>
        </h6>
      }
    }
  </ng-container>
} @else {
  @switch (level) {
    @case ('h1') {
      <h1 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h1>
    }
    @case ('h2') {
      <h2 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h2>
    }
    @case ('h3') {
      <h3 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h3>
    }
    @case ('h4') {
      <h4 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h4>
    }
    @case ('h5') {
      <h5 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h5>
    }
    @case ('h6') {
      <h6 [id]="id" [ngClass]="ngClass"><ng-container [ngTemplateOutlet]="content"></ng-container></h6>
    }
  }
}

<ng-template #content>
  <ng-content></ng-content>
</ng-template>
