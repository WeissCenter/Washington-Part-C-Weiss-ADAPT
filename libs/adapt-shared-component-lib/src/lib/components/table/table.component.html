<table class="usa-table">
  <caption>
    {{
    caption
    }}
  </caption>
  <div class="table-wrapper maxw-desktop-lg overflow-auto">
    <thead>
      <tr>
        @for (header of headers; track $index) {
          <th class="bg-white" scope="col">{{ header }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (item of data; track $index) {
        <tr height="25px">
          @for (keyValue of item | keyvalue : originalOrder; track keyValue.key; let isFirst = $first) {
            @if (isFirst) {
              <th scope="row">{{ keyValue.value }}</th>
            }
            @if (!isFirst) {
              <td>{{ keyValue.value }}</td>
            }
          }
        </tr>
      }
    </tbody>
  </div>
</table>
