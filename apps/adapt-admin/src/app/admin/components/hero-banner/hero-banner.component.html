<section
  aria-label="Welcome banner"
  class="hero-container shadow-1 display-flex flex-align-center padding-x-2 padding-y-2 tablet:padding-x-4 gap-4 border-top border-bottom border-base-lighter">
  @if (logoIsSvg) {
    <lib-adapt-inline-svg
      [decorative]="true"
      [src]="logoURL"
    svgClass="display-none desktop:display-flex {{logoStyleClass}}"></lib-adapt-inline-svg>
  }
  @if (!logoIsSvg) {
    <img alt="" [src]="logoURL" class="logo display-none desktop:display-flex {{logoStyleClass}}" aria-hidden="true" />
  }
  <div class="welcome-user-info width-full display-flex flex-column tablet:flex-row gap-2 padding-y-6">
    <div class="user-info-heading-name-role display-flex gap-1 flex-column">
      <span [innerHtml]="organization | okina"></span>
      <h1 class="font-3xl font-weight-normal margin-0">
        {{ name }}
      </h1>
      <p class="font-lg">{{ role }}</p>
    </div>
  </div>
</section>
